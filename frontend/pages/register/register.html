<!DOCTYPE html>
<html lang="pt-br">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">
   <link rel="stylesheet" href="../../assets/css/style.css">
   <title>Register - GameLib</title>
</head>
<body>
   <section class="login">
      <div class="login__content">
         <div>
            <h2 class="login__title">Create Account 🚀</h2>
            <form action="" class="login__form">
               <div class="login__group">
                  <div class="login__box">
                     <i class="ri-user-3-fill login__icon"></i>
                     <input type="text" required placeholder=" " class="login__input">
                     <label class="login__label">Full Name</label>
                  </div>
                  <div class="login__box">
                     <i class="ri-mail-fill login__icon"></i>
                     <input type="email" required placeholder=" " class="login__input">
                     <label class="login__label">Email</label>
                  </div>
                  <div class="login__box">
                     <i class="ri-lock-2-fill login__icon"></i>
                     <input type="password" required placeholder=" " class="login__input">
                     <label class="login__label">Password</label>
                  </div>
               </div>
               <button type="submit" class="login__button">Sign Up <i class="ri-user-add-line"></i></button>
               <p class="login__sign">Already have an account? <a href="../login/login.html">Log In</a></p>
            </form>
         </div>
         <div class="login__image">
            <img src="../../assets/img/login-bg.png" alt="" class="login__img">
         </div>
      </div>
   </section>
   <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
   <script src="../../assets/js/main.js"></script>
</body>
</html>
